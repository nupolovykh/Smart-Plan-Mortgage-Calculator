name: CI Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ──────────────────────────────────────
  # PHP: tests
  # ──────────────────────────────────────
  php-tests:
    name: PHP Tests (PHPUnit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: vendor/bin/phpunit

  # ──────────────────────────────────────
  # Frontend: lint + build
  # ──────────────────────────────────────
  frontend:
    name: Frontend (Lint + Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ──────────────────────────────────────
  # Database: verify schema
  # ──────────────────────────────────────
  database:
    name: Database Schema Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize SQLite from schema
        run: sqlite3 test_database.sqlite < database/init.sql

      - name: Load seed data
        run: sqlite3 test_database.sqlite < database/seed.sql

      - name: Verify tables exist
        run: |
          TABLES=$(sqlite3 test_database.sqlite ".tables")
          echo "Tables created: $TABLES"
          for table in areas promos payment_methods requests; do
            echo "$TABLES" | grep -q "$table" && echo "  ✓ $table" || (echo "  ✗ $table missing" && exit 1)
          done